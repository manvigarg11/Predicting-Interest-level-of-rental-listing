<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Rent Prediction</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="bg-dark text-white text-center py-4">
        <h1>House Rent Prediction</h1>
    </header>
    <main class="container mt-4">
        <form id="predictionForm">
            <div class="form-group">
                <label for="location">Location:</label>
                <input type="text" id="location" class="form-control" required>
            </div>

            <div class="form-row">
                <div class="form-group col-md-6">
                    <label for="bedrooms">Number of Bedrooms:</label>
                    <input type="number" id="bedrooms" class="form-control" required>
                </div>
                <div class="form-group col-md-6">
                    <label for="bathrooms">Number of Bathrooms:</label>
                    <input type="number" id="bathrooms" class="form-control" required>
                </div>
            </div>

            <div class="form-group">
                <label for="size">Size (in sqft):</label>
                <input type="number" id="size" class="form-control" required>
            </div>

            <button type="button" class="btn btn-primary btn-block" onclick="predictRent()">Predict Rent</button>
        </form>

        <div id="result" class="mt-4"></div>
    </main>
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
